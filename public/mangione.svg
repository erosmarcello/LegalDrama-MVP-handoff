<?xml version="1.0" encoding="UTF-8"?>
<!--
  LegalDrama defendant-portrait placeholder. Cinema-noir styled silhouette
  keyed to the Alucard / Dracula theme via CSS vars. Intended to be swapped
  for a real photo at /public/mangione.jpg (update the <img src> in
  app/case/[slug]/page.tsx marquee).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48" role="img" aria-label="Luigi Mangione (defendant, placeholder portrait)">
  <defs>
    <radialGradient id="lm-bg" cx="50%" cy="38%" r="65%">
      <stop offset="0%" stop-color="#2a2822" />
      <stop offset="100%" stop-color="#0a0a0a" />
    </radialGradient>
    <linearGradient id="lm-silhouette" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d4b88a" />
      <stop offset="100%" stop-color="#8c6f34" />
    </linearGradient>
  </defs>
  <rect width="48" height="48" fill="url(#lm-bg)" />
  <!-- Head -->
  <circle cx="24" cy="19" r="7.5" fill="url(#lm-silhouette)" />
  <!-- Shoulders / collar -->
  <path d="M 8 48 Q 8 30 24 30 Q 40 30 40 48 Z" fill="url(#lm-silhouette)" />
  <!-- Monogram stamp -->
  <text x="24" y="44" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="6" font-weight="700" fill="#0a0a0a" letter-spacing="0.15em">LM</text>
</svg>
